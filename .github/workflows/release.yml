name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Capacitor web assets
        run: |
          mkdir -p dist-capacitor
          cat > dist-capacitor/index.html << 'HTMLEOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Aux</title>
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { background: #0a0a0a; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
                h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
                p { color: #a1a1aa; font-size: 0.875rem; margin-bottom: 1.5rem; }
                .spinner { width: 24px; height: 24px; border: 2px solid #27272a; border-top-color: #d946ef; border-radius: 50%; animation: spin 0.8s linear infinite; }
                @keyframes spin { to { transform: rotate(360deg); } }
              </style>
            </head>
            <body>
              <h1>Aux</h1>
              <p id="status">Connecting...</p>
              <div class="spinner" id="spinner"></div>
              <script>
                var url = 'https://aux.alvarotc.com';
                var attempt = 0;
                function tryLoad() {
                  attempt++;
                  fetch(url, { mode: 'no-cors' })
                    .then(function () { window.location.href = url; })
                    .catch(function () {
                      if (attempt >= 30) {
                        document.getElementById('status').textContent = 'No connection. Please check your internet and restart the app.';
                        document.getElementById('spinner').style.display = 'none';
                      } else {
                        document.getElementById('status').textContent = 'Waiting for connection... (' + attempt + ')';
                        setTimeout(tryLoad, 2000);
                      }
                    });
                }
                tryLoad();
              </script>
            </body>
          </html>
          HTMLEOF

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk aux.apk

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aux ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: aux.apk
